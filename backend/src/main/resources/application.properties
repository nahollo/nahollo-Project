spring.application.name=nahollo-api
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

app.environment=${APP_ENV:dev}

# Load local dev env file automatically when present.
spring.config.import=optional:file:./backend/.env.dev.local[.properties],optional:file:./.env.dev.local[.properties]

# Database connection settings are required.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
