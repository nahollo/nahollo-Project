spring.application.name=nahollo-api
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

app.environment=${APP_ENV:dev}

# Database connection settings are provided per environment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:nahollo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
